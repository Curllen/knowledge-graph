<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Navigator - 项目知识图谱导航</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-hover: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent-color: #58a6ff;
            --accent-hover: #79c0ff;
            --success-color: #3fb950;
            --warning-color: #d29922;
            --danger-color: #f85149;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --bg-hover: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --border-color: #d0d7de;
            --accent-color: #0969da;
            --accent-hover: #0550ae;
            --success-color: #1a7f37;
            --warning-color: #9a6700;
            --danger-color: #cf222e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .theme-toggle {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            gap: 2rem;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 100px;
        }

        .sidebar h3 {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .breadcrumb {
            background-color: var(--bg-tertiary);
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover {
            color: var(--accent-color);
        }

        .breadcrumb-separator {
            margin: 0 0.5rem;
            color: var(--border-color);
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.25rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background-color: var(--bg-hover);
        }

        .nav-link.active {
            background-color: var(--accent-color);
            color: white;
        }

        .all-projects-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .all-projects-btn:hover {
            background-color: var(--accent-hover);
        }

        .nav-link.category {
            font-weight: 500;
            background-color: var(--bg-tertiary);
        }

        .nav-link.category:hover {
            background-color: var(--bg-hover);
        }

        .nav-link.module {
            /* 移除额外的 padding-left，保持与 category 一致 */
        }

        .nav-expand {
            transition: transform 0.2s;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-expand-placeholder {
            width: 24px;
            flex-shrink: 0;
        }

        .nav-expand.expanded {
            transform: rotate(90deg);
        }

        .nav-link.no-expand {
            padding-left: 1rem;
        }

        .category-checkbox,
        .module-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-color);
            flex-shrink: 0;
        }

        .category-icon,
        .module-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .category-name,
        .module-name {
            flex: 1;
        }

        .nav-children {
            margin-left: 1rem;
            border-left: 2px solid var(--border-color);
            padding-left: 0.75rem;
        }

        .nav-children.collapsed {
            display: none;
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .stats-bar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-icon {
            font-size: 1.5rem;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .search-bar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }

        #searchInput {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        #searchInput:focus {
            border-color: var(--accent-color);
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .module-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: var(--accent-color);
        }

        .module-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
        }

        .module-header h3 {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
        }

        .module-path {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .module-body {
            padding: 1.25rem;
        }

        .module-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .module-stat {
            text-align: center;
            padding: 0.75rem;
            background-color: var(--bg-tertiary);
            border-radius: 6px;
        }

        .module-stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .module-stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .module-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--bg-hover);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secondary);
        }

        .modal-header h3 {
            font-size: 1.1rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .markdown-body {
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .markdown-body h1 { font-size: 1.5rem; }
        .markdown-body h2 { font-size: 1.25rem; }
        .markdown-body h3 { font-size: 1.1rem; border-bottom: none; }

        .markdown-body p {
            margin-bottom: 1rem;
        }

        .markdown-body code {
            background-color: var(--bg-tertiary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background-color: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
        }

        .markdown-body ul, .markdown-body ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body li {
            margin-bottom: 0.25rem;
        }

        .markdown-body a {
            color: var(--accent-color);
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            text-align: left;
        }

        .markdown-body th {
            background-color: var(--bg-tertiary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-text {
            font-size: 1.1rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                max-height: none;
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1>🗺️ Knowledge Graph Navigator</h1>
                <p class="description">Code Knowledge Graph Navigation Hub - 项目知识图谱导航平台</p>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>📁 Directory Tree</h3>
            <button class="all-projects-btn" onclick="clearAllSelections()">All Projects</button>
            <ul class="nav-list" id="navTree"></ul>
        </aside>

        <main class="content">
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <span class="stat-icon">📦</span>
                    <div class="stat-info">
                        <span class="stat-value" id="totalModules">0</span>
                        <span class="stat-label">Modules</span>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🔷</span>
                    <div class="stat-info">
                        <span class="stat-value" id="totalNodes">0</span>
                        <span class="stat-label">Nodes</span>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🔗</span>
                    <div class="stat-info">
                        <span class="stat-value" id="totalEdges">0</span>
                        <span class="stat-label">Edges</span>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">👥</span>
                    <div class="stat-info">
                        <span class="stat-value" id="totalCommunities">0</span>
                        <span class="stat-label">Communities</span>
                    </div>
                </div>
            </div>

            <div class="search-bar" id="searchBar">
                <input type="text" id="searchInput" placeholder="🔍 Search modules... (Ctrl+K)">
            </div>

            <div class="modules-grid" id="modulesGrid">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Document</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-content markdown-body" id="modalContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Theme Management
        let currentTheme = localStorage.getItem('theme') || 'dark';
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            currentTheme = theme;
            localStorage.setItem('theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '🌙 Dark' : '☀️ Light';
        }

        setTheme(currentTheme);

        document.getElementById('themeToggle').addEventListener('click', () => {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Data Management
        let data = null;
        let currentPath = [];
        let expandedCategories = new Set();
        let searchQuery = '';

        // Flatten tree for filtering
        function flattenTree(items, path = []) {
            let flat = [];
            for (const item of items) {
                const currentPathStr = path.join('/');
                if (item.type === 'module') {
                    flat.push({ ...item, categoryPath: currentPathStr });
                } else if (item.type === 'category') {
                    flat = flat.concat(flattenTree(item.children, [...path, item.name]));
                }
            }
            return flat;
        }

        // Get unique categories for filtering
        function getCategories(items, path = []) {
            let categories = new Set();
            for (const item of items) {
                if (item.type === 'category') {
                    const catPath = [...path, item.name].join('/');
                    categories.add(catPath);
                    categories = new Set([...categories, ...getCategories(item.children, [...path, item.name])]);
                }
            }
            return Array.from(categories);
        }

        // Render navigation tree
        function renderNavTree(items, container, path = []) {
            for (const item of items) {
                const li = document.createElement('li');
                li.className = 'nav-item';

                if (item.type === 'category') {
                    const pathStr = path.join('/');
                    const isExpanded = expandedCategories.has(item.path);
                    const checkState = getCategoryCheckState(item);
                    const hasChildren = item.children && item.children.length > 0;
                    
                    li.innerHTML = `
                        <div class="nav-link category" data-path="${item.path}">
                            ${hasChildren ? `<span class="nav-expand ${isExpanded ? 'expanded' : ''}">▶</span>` : `<span class="nav-expand-placeholder"></span>`}
                            <input type="checkbox" class="category-checkbox" data-path="${item.path}" ${checkState > 0 ? 'checked' : ''} ${checkState === 1 ? 'indeterminate' : ''}>
                            <span class="category-icon">📁</span>
                            <span class="category-name">${item.display_name}</span>
                        </div>
                    `;

                    // 展开/折叠事件 - 只有有子分类时才绑定
                    if (hasChildren) {
                        const expandBtn = li.querySelector('.nav-expand');
                        expandBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            toggleCategory(item.path);
                        });
                    }

                    // 复选框事件
                    const checkbox = li.querySelector('.category-checkbox');
                    // Set indeterminate state
                    if (checkState === 1) {
                        checkbox.indeterminate = true;
                    }
                    checkbox.addEventListener('change', (e) => {
                        e.stopPropagation();
                        toggleCategorySelection(item.path, e.target.checked);
                    });

                    if (hasChildren) {
                        const ul = document.createElement('ul');
                        ul.className = `nav-children ${isExpanded ? '' : 'collapsed'}`;
                        ul.dataset.path = item.path;
                        renderNavTree(item.children, ul, [...path, item.name]);
                        li.appendChild(ul);
                    }
                } else if (item.type === 'module') {
                    const pathStr = path.join('/');
                    const isChecked = selectedModules.has(item.path);
                    
                    li.innerHTML = `
                        <div class="nav-link module" data-path="${pathStr}" data-module="${item.path}">
                            <span class="nav-expand-placeholder"></span>
                            <input type="checkbox" class="module-checkbox" data-path="${item.path}" ${isChecked ? 'checked' : ''}>
                            <span class="module-icon">📦</span>
                            <span class="module-name">${item.display_name}</span>
                        </div>
                    `;

                    // 复选框事件
                    const checkbox = li.querySelector('.module-checkbox');
                    checkbox.addEventListener('change', (e) => {
                        e.stopPropagation();
                        toggleModuleSelection(item.path, e.target.checked);
                    });
                }

                container.appendChild(li);
            }
        }

        // Selected categories and modules
        let selectedCategories = new Set();
        let selectedModules = new Set();

        // Toggle category expansion
        function toggleCategory(pathStr) {
            if (expandedCategories.has(pathStr)) {
                expandedCategories.delete(pathStr);
            } else {
                expandedCategories.add(pathStr);
            }
            const navTree = document.getElementById('navTree');
            navTree.innerHTML = '';
            renderNavTree(data.tree, navTree);
        }

        // Get category check state: 0=unchecked, 1=partial, 2=checked
        function getCategoryCheckState(category) {
            let checkedCount = 0;
            let totalCount = 0;
            
            function countChildren(item) {
                if (item.type === 'module') {
                    totalCount++;
                    if (selectedModules.has(item.path)) {
                        checkedCount++;
                    }
                } else if (item.type === 'category' && item.children) {
                    item.children.forEach(countChildren);
                }
            }
            
            countChildren(category);
            
            if (totalCount === 0) return 0;
            if (checkedCount === 0) return 0;
            if (checkedCount === totalCount) return 2;
            return 1;
        }

        // Toggle category selection with cascade
        function toggleCategorySelection(categoryPath, checked) {
            // Find the category
            function findCategory(items, path) {
                for (const item of items) {
                    if (item.type === 'category' && item.path === path) {
                        return item;
                    } else if (item.type === 'category' && item.children) {
                        const found = findCategory(item.children, path);
                        if (found) return found;
                    }
                }
                return null;
            }
            
            const category = findCategory(data.tree, categoryPath);
            if (!category) return;
            
            // Select/deselect all children
            function setChildrenChecked(item, isChecked) {
                if (item.type === 'module') {
                    if (isChecked) {
                        selectedModules.add(item.path);
                    } else {
                        selectedModules.delete(item.path);
                    }
                } else if (item.type === 'category' && item.children) {
                    item.children.forEach(child => setChildrenChecked(child, isChecked));
                }
            }
            
            setChildrenChecked(category, checked);
            
            // Update parent category states
            updateParentCategoryStates();
            
            // Re-render
            const navTree = document.getElementById('navTree');
            navTree.innerHTML = '';
            renderNavTree(data.tree, navTree);
            updateModuleDisplay();
        }

        // Update parent category states based on children
        function updateParentCategoryStates() {
            selectedCategories.clear();
            
            function checkCategory(items) {
                for (const item of items) {
                    if (item.type === 'category') {
                        const state = getCategoryCheckState(item);
                        if (state === 2) {
                            selectedCategories.add(item.path);
                        }
                        if (item.children) {
                            checkCategory(item.children);
                        }
                    }
                }
            }
            
            checkCategory(data.tree);
        }

        // Toggle module selection
        function toggleModuleSelection(modulePath, checked) {
            if (checked) {
                selectedModules.add(modulePath);
            } else {
                selectedModules.delete(modulePath);
            }
            
            // Update parent category states
            updateParentCategoryStates();
            
            // Re-render
            const navTree = document.getElementById('navTree');
            navTree.innerHTML = '';
            renderNavTree(data.tree, navTree);
            updateModuleDisplay();
        }

        // Update module display based on selections
        function updateModuleDisplay() {
            const allModules = getAllModules();
            if (selectedModules.size === 0 && selectedCategories.size === 0) {
                renderModules(allModules);
                updateBreadcrumb([]);
            } else {
                const filteredModules = allModules.filter(m => selectedModules.has(m.path));
                renderModules(filteredModules);
                updateBreadcrumb([]);
            }
        }

        // Clear all selections
        function clearAllSelections() {
            selectedCategories.clear();
            selectedModules.clear();
            const navTree = document.getElementById('navTree');
            navTree.innerHTML = '';
            renderNavTree(data.tree, navTree);
            updateModuleDisplay();
        }

        // Show single module
        function showModule(module) {
            updateBreadcrumb([module.categoryPath]);
            renderModules([module]);
        }

        // Update breadcrumb
        function updateBreadcrumb(path) {
            const breadcrumb = document.getElementById('breadcrumb');
            
            if (path.length === 0 || path[0] === '') {
                breadcrumb.innerHTML = '<span class="breadcrumb-item" data-path="">All Projects</span>';
                return;
            }

            const parts = path[0].split('/');
            let html = '<span class="breadcrumb-item" data-path="">All Projects</span>';
            let currentPath = '';
            
            for (let i = 0; i < parts.length; i++) {
                currentPath = parts.slice(0, i + 1).join('/');
                html += `<span class="breadcrumb-separator">/</span>`;
                html += `<span class="breadcrumb-item" data-path="${currentPath}">${parts[i]}</span>`;
            }

            breadcrumb.innerHTML = html;

            // Add click handlers
            breadcrumb.querySelectorAll('.breadcrumb-item').forEach(item => {
                item.addEventListener('click', () => {
                    const path = item.dataset.path;
                    if (path === '') {
                        showAllModules();
                    } else {
                        showCategory(path);
                    }
                });
            });
        }

        // Show all modules or filtered
        function showAllModules() {
            currentPath = [];
            updateBreadcrumb([]);
            renderModules(getAllModules());
        }

        // Show category and its children
        function showCategory(pathStr) {
            currentPath = pathStr.split('/');
            updateBreadcrumb([pathStr]);
            
            const allModules = flattenTree(data.tree);
            const filtered = allModules.filter(m => m.categoryPath === pathStr);
            renderModules(filtered);
        }

        // Get all modules from tree
        function getAllModules() {
            return flattenTree(data.tree);
        }

        // Render modules grid
        function renderModules(modules) {
            const grid = document.getElementById('modulesGrid');
            
            if (modules.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">No modules found</div>
                    </div>
                `;
                return;
            }

            // Apply search
            let filtered = modules;
            if (searchQuery.trim()) {
                const query = searchQuery.toLowerCase().trim();
                filtered = filtered.filter(m => {
                    return m.display_name.toLowerCase().includes(query) ||
                           m.path.toLowerCase().includes(query) ||
                           m.categoryPath.toLowerCase().includes(query);
                });
            }

            grid.innerHTML = filtered.map(module => `
                <div class="module-card">
                    <div class="module-header">
                        <h3>${module.display_name}</h3>
                        <div class="module-path">${module.path.replace(/-graphify-out/g, '')}</div>
                    </div>
                    <div class="module-body">
                        <div class="module-stats">
                            <div class="module-stat">
                                <div class="module-stat-value">${module.num_nodes.toLocaleString()}</div>
                                <div class="module-stat-label">节点</div>
                            </div>
                            <div class="module-stat">
                                <div class="module-stat-value">${module.num_edges.toLocaleString()}</div>
                                <div class="module-stat-label">边</div>
                            </div>
                            <div class="module-stat">
                                <div class="module-stat-value">${module.num_communities}</div>
                                <div class="module-stat-label">社区</div>
                            </div>
                        </div>
                        <div class="module-actions">
                            <a href="${module.graph_html}" target="_blank" class="btn btn-primary">📊 图谱</a>
                            <button class="btn btn-secondary" onclick="showReport('${module.graph_report}', '📄 报告')">📄 报告</button>
                            ${module.analysis_report ? `<button class="btn btn-secondary" onclick="showReport('${module.analysis_report}', '📑 分析')">📑 分析</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Show report in modal
        async function showReport(url, title) {
            const overlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');

            modalTitle.textContent = title;
            modalContent.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            overlay.classList.add('active');

            try {
                const response = await fetch(url);
                if (response.ok) {
                    const markdown = await response.text();
                    modalContent.innerHTML = marked.parse(markdown);
                } else {
                    modalContent.innerHTML = '<p>Failed to load content</p>';
                }
            } catch (error) {
                modalContent.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        // Close modal
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('active');
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        });

        // Update stats
        function updateStats() {
            const allModules = getAllModules();
            document.getElementById('totalModules').textContent = allModules.length;
            document.getElementById('totalNodes').textContent = allModules.reduce((sum, m) => sum + m.num_nodes, 0).toLocaleString();
            document.getElementById('totalEdges').textContent = allModules.reduce((sum, m) => sum + m.num_edges, 0).toLocaleString();
            document.getElementById('totalCommunities').textContent = allModules.reduce((sum, m) => sum + m.num_communities, 0).toLocaleString();
        }

        // Initialize
        async function init() {
            try {
                const response = await fetch('directory_tree.json');
                if (!response.ok) {
                    throw new Error('Failed to load directory_tree.json');
                }
                data = await response.json();

                // All categories collapsed by default
                // expandedCategories is initialized as empty Set

                // Render
                renderNavTree(data.tree, document.getElementById('navTree'));
                updateStats();
                renderModules(getAllModules());

                // Add search listener
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    renderModules(getAllModules());
                });

                // Add keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        if (e.key === 'k' || e.key === 'K') {
                            e.preventDefault();
                            searchInput.focus();
                        }
                    }
                });
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('modulesGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">Failed to load data. Please ensure you are running this page through a web server, or check if directory_tree.json exists.</div>
                        <div class="empty-text" style="margin-top: 1rem; font-size: 0.9rem;">
                            <p>To generate data, run:</p>
                            <code style="background-color: var(--bg-tertiary); padding: 0.25rem 0.5rem; border-radius: 4px; display: inline-block; margin-top: 0.5rem;">python3 scan_directory.py</code>
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
